name: comms-triage
description: Scan Gmail + iMessage, prioritize messages, draft replies, produce digest

# Engine: comms_claude (NOT github_claude — no git worktree, no GitHub source/destination)
# Run: python -m engines.comms_claude [--hours 24] [--budget 0.50] [--model sonnet]

budget:
  max_per_run_usd: 0.50

models:
  haiku:
    name: claude-haiku-4-5
    max_tokens: 8192
    cost: {input_per_mtok: 0.80, output_per_mtok: 4.00}
  sonnet:
    name: claude-sonnet-4-6
    max_tokens: 16384
    cost: {input_per_mtok: 3.00, output_per_mtok: 15.00}
  m27hs:
    name: MiniMax-M2.7-highspeed
    max_tokens: 16384
    cost: {input_per_mtok: 0.20, output_per_mtok: 0.80}
  m3:
    name: MiniMax-M3
    max_tokens: 16384
    cost: {input_per_mtok: 0.30, output_per_mtok: 1.20}

phases:
  - name: scan
    model: m27hs
    max_turns: 10
  - name: prioritize
    model: m27hs
    max_turns: 3
  - name: draft-replies
    model: m3
    max_turns: 5
  - name: digest
    model: m27hs
    max_turns: 3

# Gates are lightweight for v1 — no code correctness to verify
gates:
  scan:
    - messages_array_present
  prioritize:
    - buckets_present
  digest:
    - digest_path_present

# No review phase for v1 — digest IS the review artifact
