name: shftty-ios
description: Domain-specific workflow for the shftty iOS app (Swift/SwiftUI healthcare staffing)

budget:
  max_per_run_usd: 10.00

# NOTE: there is intentionally no `default_model` field here.
# Per-phase model entries below are the single source of truth.
# Explicit --model CLI flag still wins.

models:
  haiku:
    name: claude-haiku-4-5
    max_tokens: 8192
    cost: {input_per_mtok: 0.80, output_per_mtok: 4.00}
  sonnet:
    name: claude-sonnet-4-6
    max_tokens: 16384
    cost: {input_per_mtok: 3.00, output_per_mtok: 15.00}
  opus:
    name: claude-opus-4-6
    max_tokens: 16384
    cost: {input_per_mtok: 15.00, output_per_mtok: 75.00}
  m27hs:
    name: MiniMax-M2.7-highspeed
    max_tokens: 16384
    cost: {input_per_mtok: 0.20, output_per_mtok: 0.80}
  m3:
    name: MiniMax-M3
    max_tokens: 16384
    cost: {input_per_mtok: 0.30, output_per_mtok: 1.20}

phases:
  # Triage: investigate the issue, verify claims against the codebase,
  # check for prior work, and produce a plan. Decides PROCEED/SKIP/ESCALATE.
  - name: triage
    model: sonnet
    max_turns: 30

  # Execute: implements the fix, writes tests first, builds and lints,
  # commits each logical unit. Gets full triage context via {prior_phases}.
  - name: execute
    model: sonnet
    max_turns: 50

  # Review: reads the branch diff, runs build/lint/test gates, checks iOS
  # rules and known bug patterns. Decides PASS/WARN/FAIL.
  - name: review
    model: sonnet
    max_turns: 20

  # Validate: runs Maestro E2E against the app (optional — skipped when no
  # new user-facing flows were added or no simulator is available).
  - name: validate
    model: sonnet
    max_turns: 10
    optional: true

  # Improve: deep retrospective. Reviews all prior work, surfaces learnings,
  # updates knowledge docs. Opus only — this is the highest-value phase.
  - name: improve
    model: opus
    max_turns: 30

# Decision parsing — orchestrator greps for these keywords in phase output
decision_parsing:
  triage:
    section: "## Decision"
    signals:
      proceed: "PROCEED"
      skip: "SKIP:"
      escalate: "ESCALATE:"
    default: "proceed"
  review:
    section: "## Verdict"
    signals:
      pass: "PASS"
      warn: "WARN"
      fail: "FAIL"
    default: "pass"

# Gates that the orchestrator checks after each phase
gates:
  triage:
    - decision_present        # output contains ## Decision section
    - decision_valid          # section contains PROCEED, SKIP:, or ESCALATE:
  execute:
    - commits_on_branch       # git log origin/main..HEAD returns at least one commit
  review:
    - verdict_present         # output contains ## Verdict section
    - build_gate_logged       # output mentions build exit code

# Template variables injected into each prompt
template_vars:
  - issue_number
  - issue_body
  - repo_context
  - recent_learnings
  - prior_phases              # full markdown text from prior phases (no JSON serialization)
