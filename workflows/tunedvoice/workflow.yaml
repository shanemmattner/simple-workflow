name: tunedvoice
description: Domain-specific workflow for TunedVoice — macOS push-to-talk dictation app (Swift/SwiftUI, FluidAudio, ANE)

budget:
  max_per_run_usd: 10.00

# NOTE: no default_model — per-phase model entries below are the single source of truth.
# Explicit --model CLI flag still wins.

models:
  haiku:
    name: claude-haiku-4-5
    max_tokens: 8192
    cost: {input_per_mtok: 0.80, output_per_mtok: 4.00}
  sonnet:
    name: claude-sonnet-4-6
    max_tokens: 16384
    cost: {input_per_mtok: 3.00, output_per_mtok: 15.00}
  opus:
    name: claude-opus-4-6
    max_tokens: 16384
    cost: {input_per_mtok: 15.00, output_per_mtok: 75.00}
  m27hs:
    name: MiniMax-M2.7-highspeed
    max_tokens: 16384
    cost: {input_per_mtok: 0.20, output_per_mtok: 0.80}
  m3:
    name: MiniMax-M3
    max_tokens: 16384
    cost: {input_per_mtok: 0.30, output_per_mtok: 1.20}

phases:
  - name: triage
    model: sonnet
    max_turns: 30
    # Triage reads the issue, checks for prior work, reads relevant code,
    # and produces a plan. Ends with PROCEED / SKIP / ESCALATE.
    # Uses .workflows/context.md and .workflows/testing.md for repo context.

  - name: execute
    model: sonnet
    max_turns: 50
    # Execute implements the fix: test first (red), implement (green), commit.
    # Must use wrapper scripts (./scripts/test-unit.sh, zsh scripts/dev.sh).
    # Never calls swift build directly. Never runs parallel builds.

  - name: review
    model: sonnet
    max_turns: 20
    # Review reads the diff, checks TunedVoice-specific rules (encryption,
    # test isolation, DI protocol, session UUIDs, SPM constraints).
    # Ends with PASS / WARN / FAIL.

  - name: validate
    model: sonnet
    max_turns: 10
    optional: true
    # Optional: runs build smoke-test and CI-safe test suite against the branch.
    # Skipped when no test-runnable changes exist or when running on a machine
    # without the dev environment (no Apple Silicon, no SPM cache).

  - name: improve
    model: opus
    max_turns: 30
    # Deep retrospective. Reviews what triage found, what execute built,
    # what review caught, and what validate confirmed. Feeds learnings back
    # into workstream docs and prompt improvements. Opus only — worth the cost.

# Gates: text-based only. No JSON parsing.
#
# triage gate:  output contains "## Decision" section with PROCEED / SKIP / ESCALATE
# execute gate: commits exist on branch (git log origin/main..HEAD --oneline)
# review gate:  output contains "## Verdict" section with PASS / WARN / FAIL
#
# The orchestrator greps for these keywords. No structured output required.

gates:
  triage:
    - decision_keyword_present   # "## Decision" section + PROCEED|SKIP|ESCALATE
  execute:
    - commits_on_branch          # git log origin/main..HEAD has at least 1 commit
  review:
    - verdict_keyword_present    # "## Verdict" section + PASS|WARN|FAIL

# Repo context injection
# The orchestrator injects these files into {repo_context} for the triage phase:
#   .workflows/context.md   — monorepo structure, key files, build commands
#   .workflows/testing.md   — test frameworks, isolation patterns, known CI failures
#
# Prior phase outputs are injected as {prior_phases} (full markdown text).
# No JSON serialization. Phases communicate through natural language.

context_files:
  - .workflows/context.md
  - .workflows/testing.md
