name: shftty-android
description: Domain-specific 5-phase workflow for the shftty Android app (Kotlin/Jetpack Compose healthcare staffing)

budget:
  max_per_run_usd: 10.00

# NOTE: there is intentionally no `default_model` field here.
# Per-phase model entries below are the single source of truth.
# Explicit --model CLI flag still wins.

models:
  haiku:
    name: claude-haiku-4-5
    max_tokens: 8192
    cost: {input_per_mtok: 0.80, output_per_mtok: 4.00}
  sonnet:
    name: claude-sonnet-4-6
    max_tokens: 16384
    cost: {input_per_mtok: 3.00, output_per_mtok: 15.00}
  opus:
    name: claude-opus-4-6
    max_tokens: 16384
    cost: {input_per_mtok: 15.00, output_per_mtok: 75.00}
  m27hs:
    name: MiniMax-M2.7-highspeed
    max_tokens: 16384
    cost: {input_per_mtok: 0.20, output_per_mtok: 0.80}
  m3:
    name: MiniMax-M3
    max_tokens: 16384
    cost: {input_per_mtok: 0.30, output_per_mtok: 1.20}

phases:
  # Triage: deep investigation. Reads the issue, checks for prior work, greps the codebase,
  # confirms the bug or scopes the feature, writes a complete plan.
  # Decision signal: ## Decision section containing PROCEED / SKIP: <reason> / ESCALATE: <reason>
  - name: triage
    model: sonnet
    max_turns: 30

  # Execute: implements the plan. Pattern-first. Builds in Android dependency order
  # (data → repository → viewmodel → composable). Writes unit tests. Commits each step.
  # Runs ./gradlew assembleDebug and testDebugUnitTest to verify.
  - name: execute
    model: sonnet
    max_turns: 50

  # Review: reads the full diff, checks against Android rules and 7 known bug patterns,
  # runs build/test/lint gates.
  # Verdict signal: ## Verdict section containing PASS / WARN / FAIL
  - name: review
    model: sonnet
    max_turns: 20

  # Validate: optional — Playwright or manual validation against a real device/emulator.
  # Skip when no UI changes were made or no connected device is available.
  - name: validate
    model: sonnet
    max_turns: 10
    optional: true

  # Improve: deep retrospective. Reviews all prior phases, captures learnings, updates
  # workstream docs. Opus because synthesis across all phases needs the most reasoning.
  - name: improve
    model: opus
    max_turns: 30

# Gate signals (text-based, no JSON parsing)
# Triage gate: scan output for ## Decision section; extract PROCEED/SKIP/ESCALATE
# Execute gate: verify commits exist on branch (git log origin/main..HEAD --oneline)
# Review gate: scan output for ## Verdict section; extract PASS/WARN/FAIL

gates:
  triage:
    - decision_keyword_present   # ## Decision section contains PROCEED, SKIP, or ESCALATE
  execute:
    - commits_on_branch          # at least one commit ahead of origin/main
    - build_passes               # ./gradlew assembleDebug exits 0
  review:
    - verdict_keyword_present    # ## Verdict section contains PASS, WARN, or FAIL
