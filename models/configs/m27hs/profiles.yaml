# MiniMax M2.7-highspeed sampling profiles
# Mirrors M3 profiles — M2.7-hs is a faster/cheaper sibling, same tool-use constraints
default:
  temperature: 0.0             # Required for stable tool use
  top_p: 0.95
  max_tokens: 16384
  strip_think_tags: true
  checkpoint_interval: 4
  budget_warning_turns: 8
  budget_critical_turns: 4
  max_turns:
    investigate: 20
    implement: 25
    review: 15
  system_prompt_suffix: ""

coding:
  temperature: 0.0
  max_tokens: 8192
  max_turns:
    investigate: 15
    implement: 20
    review: 12

fast:
  temperature: 0.0
  max_tokens: 4096
  max_turns:
    investigate: 10
    implement: 15
    review: 8
