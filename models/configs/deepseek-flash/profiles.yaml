# DeepSeek V4 Flash sampling profiles
# DeepSeek emits <think> blocks and over-explores — needs hard turn limits.
default:
  temperature: 0.3
  top_p: 0.95
  max_tokens: 8192
  strip_think_tags: true
  checkpoint_interval: 4
  budget_warning_turns: 8
  budget_critical_turns: 4
  max_turns:
    investigate: 20
    implement: 25
    review: 15
  system_prompt_suffix: |
    IMPORTANT CONSTRAINTS:
    - Output plain text only. Do NOT wrap your reasoning in <think> or any XML tags.
    - Be extremely concise. Read only the files you need — do not explore broadly.
    - When you have enough information, STOP reading and write your answer.
    - You have a strict turn budget. Do not waste turns on unnecessary reads.

coding:
  temperature: 0.1
  max_turns:
    investigate: 15
    implement: 20
    review: 10

fast:
  temperature: 0.3
  max_tokens: 4096
  max_turns:
    investigate: 10
    implement: 15
    review: 8
