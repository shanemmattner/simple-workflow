# GLM 4.7 Flash — Z.ai Coding Plan subscription endpoint (faster, smaller variant)
adapter: zai
model_id: glm-4.7-flash
base_url: "https://api.z.ai/api/coding/paas/v4"
api_key_env: ZAI_API_KEY
api_key_env_fallbacks:
  - GLM_API_KEY
api_key_zshrc_fallback: true

aliases:
  - glm-flash
  - glm-4.7-flash

pricing:
  subscription: true
  input_per_mtok: 1.40         # nominal; subscription pricing
  output_per_mtok: 4.40
  notes: "Z.ai Coding Plan. Same subscription tier as GLM 5.2."
